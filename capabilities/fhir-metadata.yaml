    resources:
    - path: /v1/metadata
      name: metadata
      description: REST surface for metadata.
      operations:
      - method: GET
        name: metadata
        description: Fast Healthcare Interoperability Resources Return the server's capability statement
        call: fhir-metadata.metadata
        outputParameters:
        - type: object
          mapping: $.
