    resources:
    - name: Procedure
      path: /Procedure
      operations:
      - name: searchprocedure
        method: GET
        description: Fast Healthcare Interoperability Resources Search all resources of type Procedure based on a set of criteria
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: code
          in: query
          type: string
          description: '**A code to identify a  procedure**  '
        - name: date
          in: query
          type: string
          description: '**When the procedure was performed**  '
        - name: patient
          in: query
          type: string
          description: '**Search by subject - a patient**  '
        - name: status
          in: query
          type: string
          description: '**preparation | in-progress | not-done | on-hold | stopped | completed | entered-in-error | unknown**  '
      - name: createprocedure
