    baseUri: ''
    description: Fast Healthcare Interoperability Resources (FHIR) — Condition business capability. Self-contained, no shared
      references.
    resources:
    - name: Condition
      path: /Condition
      operations:
      - name: searchcondition
        method: GET
        description: Fast Healthcare Interoperability Resources Search all resources of type Condition based on a set of criteria
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: abatement-date
          in: query
          type: string
          description: '**Date-related abatements (dateTime and period)**  '
        - name: asserted-date
          in: query
          type: string
          description: Returns conditions with an [assertedDate extension](http://hl7.org/fhir/StructureDefinition/condition-assertedDate)
            matching the specified date (dateTime).
        - name: category
          in: query
          type: string
          description: '**The category of the condition**  '
        - name: clinical-status
          in: query
          type: string
          description: '**The clinical status of the condition**  '
        - name: code
          in: query
          type: string
          description: '**Code for the condition**  '
        - name: encounter
          in: query
          type: string
          description: '**Encounter created as part of**  '
        - name: onset-date
          in: query
          type: string
          description: '**Date related onsets (dateTime and Period)**  '
        - name: patient
          in: query
          type: string
          description: '**Who has the condition?**  '
        - name: recorded-date
          in: query
          type: string
          description: '**Date record was first recorded**  '
        - name: _lastUpdated
          in: query
          type: string
          description: '**When the resource version last changed**  '
      - name: createcondition
        method: POST
        description: Fast Healthcare Interoperability Resources Create a new resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: Condition-_history
      path: /Condition/_history
      operations:
      - name: histtypecondition
        method: GET
        description: Fast Healthcare Interoperability Resources Read the past states of the resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _since
          in: query
          type: string
          description: Only include resource versions that were created at or after the given instant in time
        - name: _at
          in: query
          type: string
          description: Only include resource versions that were current at some point during the time period specified in
            the date time value (see Search notes on date searching)
        - name: _list
          in: query
          type: string
          description: Only include resource versions that are referenced in the specified list (current list references are
            allowed)
    - name: Condition-rid
      path: /Condition/{rid}
      operations:
      - name: readcondition
        method: GET
        description: Fast Healthcare Interoperability Resources Read the current state of the resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecondition
        method: PUT
        description: Fast Healthcare Interoperability Resources Update the current state of the resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: patchcondition
        method: PATCH
        description: Fast Healthcare Interoperability Resources Change the current state of the resource by providing a patch
          - a series of change commands
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecondition
        method: DELETE
        description: Fast Healthcare Interoperability Resources Delete the resource so that it no exists (no read, search
          etc)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: Condition-rid-_history
      path: /Condition/{rid}/_history
