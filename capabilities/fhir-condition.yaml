naftiko: 1.0.0-alpha2
info:
  label: Fast Healthcare Interoperability Resources (FHIR) — Condition
  description: 'Fast Healthcare Interoperability Resources (FHIR) — Condition. 9 operations. Lead operation: Fast Healthcare
    Interoperability Resources Search all resources of type Condition based on a set of criteria. Self-contained Naftiko capability
    covering one Fhir business surface.'
  tags:
  - Fhir
  - Condition
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FHIR_API_KEY: FHIR_API_KEY
capability:
