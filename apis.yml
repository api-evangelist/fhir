    name: US Core Server CapabilityStatement
    description: This section describes the expected capabilities of the US Core Server actor which is responsible for providing
      responses to the queries submitted by US Core Requestors. Implementations meet ONC 2015 Common Clinical Data Set (CCDS)
      Patient Selection 170.315(g)(7) and Application Access - Data Category Request 170.315(g)(8) requirements as well as USCDI
      Version 4 (July 2023).
