aid: fhir
name: Fast Healthcare Interoperability Resources
description: >-
  FHIR (Fast Healthcare Interoperability Resources) is a platform specification
  developed by HL7 that defines a set of capabilities for use across the
  healthcare process, in all jurisdictions, and in many different clinical and
  administrative contexts. It standardizes how electronic health information
  is exchanged between systems via REST APIs.
